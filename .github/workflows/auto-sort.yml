name: Auto Sort DSA Problems

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-sort-dsa
  cancel-in-progress: true

jobs:
  sort-problems:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for LeetHub commits
        run: sleep 30

      - name: Checkout latest repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run problem sorter
        run: python scripts/sort_problems.py

      - name: Commit sorted problems
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No sorting changes found."
          else
            git commit -m "Auto-sort DSA problems"
            git push origin main
          fi